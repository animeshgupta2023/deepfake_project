name: Deepfake API CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest # Spins up a blank Linux server

    steps:
    # 1. Copies code from your repository onto the server
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Installs Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip' # Caches downloads so future tests run much faster

    # 3. Installs your requirements + the pytest testing library
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements.txt

    # 4. Runs your tests!
    - name: Run Pytest
      run: |
        pytest tests/